<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>家族カレンダー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-deco">
      <span class="pixel-star star-1"></span>
      <span class="pixel-star star-2"></span>
      <span class="pixel-star star-3"></span>
    </div>
    <div class="header-inner">
      <div class="header-brand">
        <span class="pixel-octopus" aria-label="タコ"></span>
        <span class="pixel-house" aria-label="家"></span>
        <div class="brand-text">
          <span class="brand-name">家族カレンダー</span>
          <span class="brand-sub">みんなの予定を共有しよう</span>
        </div>
        <div class="connection-badge" id="connectionStatus">
          <span class="connection-dot"></span>
          <span class="connection-text">接続中</span>
        </div>
      </div>
      <div class="header-user">
        <span class="user-label">表示中：</span>
        <div class="user-select-wrap">
          <select id="currentUser" class="user-select"></select>
        </div>
      </div>
    </div>
  </header>

  <!-- メイン -->
  <main class="main">

    <!-- カレンダーセクション -->
    <section class="calendar-section">

      <div class="calendar-header">
        <div class="calendar-nav">
          <button class="nav-btn" id="prevMonth" aria-label="前月">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <h2 class="month-title" id="monthTitle"></h2>
          <button class="nav-btn" id="nextMonth" aria-label="次月">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="today-btn" id="todayBtn">今日</button>
        </div>
        <div class="member-filters" id="memberFilters"></div>
      </div>

      <div class="calendar-card">
        <div class="calendar-grid" id="calendarGrid">
          <div class="day-header">日</div>
          <div class="day-header">月</div>
          <div class="day-header">火</div>
          <div class="day-header">水</div>
          <div class="day-header">木</div>
          <div class="day-header">金</div>
          <div class="day-header">土</div>
        </div>
      </div>
    </section>

    <!-- サイドバー -->
    <aside class="sidebar">

      <!-- 選択日パネル -->
      <div class="day-panel card">
        <div class="day-panel-header">
          <div class="selected-date-display" id="selectedDateDisplay"></div>
          <button class="add-fab" id="addEventBtn" title="予定を追加">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <div id="dayEvents" class="day-events-list"></div>
      </div>

      <!-- メンバー凡例 -->
      <div class="card">
        <h3 class="card-title">👨‍👩‍👧‍👦 メンバー</h3>
        <div class="legend" id="memberLegend"></div>
      </div>

      <!-- 今月の予定 -->
      <div class="card">
        <h3 class="card-title">📋 今月の予定</h3>
        <div id="upcomingEvents" class="upcoming-list"></div>
      </div>

    </aside>
  </main>

  <!-- モーダル -->
  <div class="modal-overlay" id="modalOverlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal" id="modalContent">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">予定を追加</h3>
        <button class="modal-close" id="modalClose" aria-label="閉じる">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="eventForm" class="event-form" autocomplete="off">
        <input type="hidden" id="eventId">

        <div class="form-group">
          <label class="form-label">タイトル <span class="required">*</span></label>
          <input type="text" id="eventTitle" class="form-input" placeholder="例：学校の運動会" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">日付 <span class="required">*</span></label>
            <input type="date" id="eventDate" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">終了日</label>
            <input type="date" id="eventEndDate" class="form-input">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">開始時刻</label>
            <input type="time" id="eventStartTime" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">終了時刻</label>
            <input type="time" id="eventEndTime" class="form-input">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">誰の予定？</label>
          <div class="member-selector" id="memberSelect"></div>
        </div>

        <div class="form-group">
          <label class="form-label">メモ</label>
          <textarea id="eventNote" class="form-input form-textarea" rows="3" placeholder="場所、持ち物など..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-danger" id="deleteEventBtn" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            削除
          </button>
          <div class="form-actions-right">
            <button type="button" class="btn btn-secondary" id="cancelBtn">キャンセル</button>
            <button type="submit" class="btn btn-primary" id="saveBtn">保存する</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
