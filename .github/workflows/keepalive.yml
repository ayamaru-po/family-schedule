name: Keep Server Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping family calendar server
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            https://family-schedule-byud.onrender.com/api/events
          echo " - サーバーに接続しました"
